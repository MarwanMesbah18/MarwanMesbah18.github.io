    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563eb" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          var d = t ? t === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (d) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
    <title>Marwan Mesbah — AI & Full-Stack Developer</title>
    <meta
      name="description"
      content="Marwan Mesbah — CS & AI student at AAST, Head of Software & AI at RobEn. Computer vision, YOLO, machine learning, and full-stack development. 2nd place MATE ROV 2025 & 2026."
    />
